name: Preview Teardown

on:
  workflow_call:
    secrets:
      FORGE_TOKEN:
        required: false
      FORGE_SERVER:
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      teardown: ${{ steps.check-title.outputs.teardown }}
    steps:
      - name: Check PR title
        id: check-title
        run: |
          if [[ "${{ github.event.pull_request.title }}" == *"[preview]"* ]]; then
            echo "teardown=true" >> $GITHUB_OUTPUT
          else
            echo "teardown=false" >> $GITHUB_OUTPUT
          fi

  teardown:
    needs: check
    if: needs.check.outputs.teardown == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Teardown preview site via Forge API
        env:
          FORGE_TOKEN: ${{ secrets.FORGE_TOKEN }}
          FORGE_SERVER: ${{ secrets.FORGE_SERVER }}
        run: |
          BRANCH="${{ github.head_ref }}"
          SITE_NAME=$(echo "$BRANCH" | tr -cd '[:alnum:]-')
          SITE_DOMAIN="${SITE_NAME}.preview.intentional.systems"
          echo "Looking for site: $SITE_DOMAIN"

          # Find site ID by domain
          SITES_JSON=$(curl -s -H "Authorization: Bearer $FORGE_TOKEN" \
            -H "Accept: application/json" \
            "https://forge.laravel.com/api/v1/servers/$FORGE_SERVER/sites")
          SITE_ID=$(echo "$SITES_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for s in data.get('sites', []):
              if '$SITE_DOMAIN' in s.get('name',''):
                  print(s['id']); break
          else:
              print('')
          ")

          if [ -z "$SITE_ID" ]; then
            echo "No preview site found for $SITE_DOMAIN — nothing to tear down."
            exit 0
          fi

          echo "Found site ID: $SITE_ID — deleting..."

          # Delete the site
          DELETE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X DELETE \
            -H "Authorization: Bearer $FORGE_TOKEN" \
            -H "Accept: application/json" \
            "https://forge.laravel.com/api/v1/servers/$FORGE_SERVER/sites/$SITE_ID")
          DELETE_STATUS=$(echo "$DELETE_RESPONSE" | tail -1)

          if [ "$DELETE_STATUS" = "200" ] || [ "$DELETE_STATUS" = "204" ]; then
            echo "Site $SITE_DOMAIN deleted successfully (HTTP $DELETE_STATUS)"
          else
            echo "::error::Failed to delete site: HTTP $DELETE_STATUS"
            echo "Response: $(echo "$DELETE_RESPONSE" | sed '$d')"
            exit 1
          fi

          # Delete the database
          echo "Cleaning up database: $SITE_NAME"
          DBS_JSON=$(curl -s -H "Authorization: Bearer $FORGE_TOKEN" \
            -H "Accept: application/json" \
            "https://forge.laravel.com/api/v1/servers/$FORGE_SERVER/databases")
          DB_ID=$(echo "$DBS_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for db in data.get('databases', []):
              if db.get('name','') == '$SITE_NAME':
                  print(db['id']); break
          else:
              print('')
          ")

          if [ -n "$DB_ID" ]; then
            curl -s -X DELETE \
              -H "Authorization: Bearer $FORGE_TOKEN" \
              -H "Accept: application/json" \
              "https://forge.laravel.com/api/v1/servers/$FORGE_SERVER/databases/$DB_ID"
            echo "Database $SITE_NAME deleted"
          else
            echo "No database found for $SITE_NAME — skipping"
          fi

          echo "Teardown complete for $SITE_DOMAIN"
